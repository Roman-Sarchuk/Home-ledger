name: Restrict PR to main

on:
  pull_request:
    branches:
      - main

jobs:
  restrict-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          echo "PR from: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "❌ Only PRs from 'dev' are allowed into 'main'"
            exit 1
          fi