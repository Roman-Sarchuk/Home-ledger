name: Backend CI

on:
  push:
    paths:
      - 'backend/**' # Run workflow when backend files change
      - '.github/workflows/backend-ci.yml' # Run workflow when this pipeline changes
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend # Specify the working directory

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Tests
        run: npm test