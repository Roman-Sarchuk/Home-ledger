name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Opt into Node.js 24 for JavaScript actions to avoid Node 20 deprecation
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    defaults:
      run:
        # keep defaults but we'll also set per-step working-directory for robustness
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show repository tree (debug)
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run linter
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
